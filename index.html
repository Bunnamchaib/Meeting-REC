    <script>
        // ----------------------------------------------------
        // 1. ใส่ URL ของ Web App ตรงนี้ (ใส่ของคุณกลับเข้าไป)
        const API_URL = "https://script.google.com/macros/s/AKfycbwGxUo4rcccPDoQqjdazV7VI8C0Or7GvlS0Y4wT1E4-0fTeBCNpGyOKDe2RtZumbbyjSg/exec";
        
        // 2. วางโค้ดรูปภาพ BASE 64 ตรงนี้ (ผมเว้นว่างไว้ให้ตามที่คุณเคยขอ)
        const LOGO_BASE64 = "";

        // ฟังก์ชันโหลดรูปโลโก้
        if(LOGO_BASE64 !== "") {
            const logoImg = document.getElementById('logo-img');
            if(logoImg) logoImg.src = LOGO_BASE64;
        }

        // ==========================================
        // จุดที่ 1: ไม่ต้องโหลดข้อมูลตารางมารอตอนเปิดเว็บ
        // ==========================================
        window.onload = function() {
            // เปิดหน้าลงทะเบียนเป็นหน้าแรก
            switchView('view-register');
            
            // ลบการเรียก loadHistory() ออก เพื่อให้หน้าเว็บโหลดเสร็จทันที ไม่เสียเวลาโหลดข้อมูล
        };

        function showLoading() {
            Swal.fire({
                title: 'กำลังประมวลผล...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }

        function hideLoading() {
            Swal.close();
        }

        // ==========================================
        // จุดที่ 3: หน้าประวัติต่างๆ ไม่ต้องเรียกข้อมูล ถ้าไม่ได้กดร้องขอ
        // ==========================================
        function switchView(viewId) {
            // ซ่อนทุกหน้า
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
            });
            // แสดงหน้าที่เลือก
            const viewEl = document.getElementById(viewId);
            if(viewEl) viewEl.classList.remove('hidden');

            // **ดึงข้อมูลก็ต่อเมื่อมีการเปลี่ยนมาที่หน้าประวัติ (view-history) เท่านั้น**
            if (viewId === 'view-history') {
                loadHistory(); 
            }
        }

        // ==========================================
        // จุดที่ 2: ลอจิกส่งข้อมูลลงชื่อ (ทำแค่ส่งข้อมูลให้ไวมาก แล้วโชว์ปุ่มให้เลือก)
        // ==========================================
        async function submitForm(event) {
            event.preventDefault();
            
            // รวบรวมข้อมูลจากฟอร์ม
            const form = document.getElementById('register-form');
            if(!form) return;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            showLoading(); // แสดง UI กำลังโหลด
            
            try {
                // ส่งข้อมูลไปเซฟอย่างเดียว (ไม่โหลดตารางกลับมา) เพื่อความไว
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'register', ...data })
                });
                const res = await response.json();
                
                hideLoading();

                if (res.status === 'success' || res.success) {
                    // ลงชื่อเสร็จ โชว์ Popup แบบมีปุ่มให้กดเลือก
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงชื่อเข้าประชุมสำเร็จ',
                        showCancelButton: true,
                        confirmButtonColor: '#3085d6',
                        cancelButtonColor: '#d33',
                        confirmButtonText: 'ดูประวัติการประชุม',
                        cancelButtonText: 'ปิดหน้าต่าง',
                        reverseButtons: true
                    }).then((result) => {
                        form.reset(); // รีเซ็ตฟอร์มให้คนต่อไปพร้อมลงชื่อ
                        
                        // ถ้าผู้ใช้กดปุ่ม "ดูประวัติการประชุม" ระบบค่อยสั่งเปลี่ยนหน้าและดึงข้อมูล
                        if (result.isConfirmed) {
                            switchView('view-history'); 
                        }
                    });
                } else {
                    Swal.fire('ข้อผิดพลาด', res.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                }
            } catch(e) { 
                hideLoading(); 
                Swal.fire('ข้อผิดพลาด', 'ส่งข้อมูลไม่สำเร็จ', 'error'); 
            }
        }

        // ==========================================
        // ฟังก์ชันดึงประวัติการประชุม (ทำงานเมื่อถูกเรียกจาก switchView เท่านั้น)
        // ==========================================
        async function loadHistory() {
            showLoading();
            try {
                // ยิง API ดึงข้อมูลประวัติ
                const response = await fetch(API_URL + "?action=getHistory"); 
                const res = await response.json();
                hideLoading();
                
                if (res.status === 'success' || res.success) {
                    const tbody = document.getElementById('history-tbody');
                    if(tbody) {
                        tbody.innerHTML = '';
                        res.data.forEach((item, index) => {
                            tbody.innerHTML += `
                                <tr>
                                    <td class="border border-gray-300 p-2 text-center">${index + 1}</td>
                                    <td class="border border-gray-300 p-2">${item.name}</td>
                                    <td class="border border-gray-300 p-2 text-center">${item.empId}</td>
                                    <td class="border border-gray-300 p-2 text-center">${item.time}</td>
                                </tr>
                            `;
                        });
                    }
                }
            } catch(e) {
                hideLoading();
                Swal.fire('ข้อผิดพลาด', 'ดึงข้อมูลประวัติไม่สำเร็จ', 'error');
            }
        }

        // ==========================================
        // จุดที่ 4: หน้าดึงข้อมูลรายงาน (จำเป็นต้องดึงตาราง คงไว้ตามเดิม)
        // ==========================================
        async function fetchReport() {
            const typeInput = document.getElementById('report-type').value;
            const dateStr = document.getElementById('report-date').value;
            
            showLoading();
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'report', type: typeInput, date: dateStr })
                });
                const res = await response.json();
                hideLoading();
                
                if (res.status === 'success' || res.success) {
                    if (!res.data || res.data.length === 0) {
                        return Swal.fire('ไม่พบข้อมูล', `ไม่มีผู้เข้าร่วมประชุม ${typeInput} ในวันที่ ${dateStr}`, 'info');
                    }
                    
                    // นำข้อมูลลงฟอร์ม A4
                    document.getElementById('r-type').innerText = typeInput;
                    document.getElementById('r-date').innerText = dateStr;
                    
                    const tbody = document.getElementById('r-tbody');
                    tbody.innerHTML = '';
                    
                    res.data.forEach(item => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="border border-black p-2 text-center">${item.no}</td>
                                <td class="border border-black p-2">${item.name}</td>
                                <td class="border border-black p-2 text-center">${item.empId}</td>
                                <td class="border border-black p-2">${item.position}</td>
                                <td class="border border-black p-2 text-center">${item.time}</td>
                            </tr>
                        `;
                    });

                    switchView('view-print');
                } else {
                    Swal.fire('ข้อผิดพลาด', res.message, 'error');
                }
            } catch(e) { hideLoading(); Swal.fire('ข้อผิดพลาด', 'ดึงข้อมูลรายงานไม่สำเร็จ', 'error'); }
        }
    </script>
    
</body>
</html>
