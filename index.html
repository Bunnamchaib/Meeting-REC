<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCT Meeting Registration (Performance Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { background: linear-gradient(to bottom, #f3f4f6, #e5e7eb); }
        .logo-placeholder { height: 80px; width: auto; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; color: #4b5563; }
        
        @media print {
            body * { visibility: hidden; }
            #view-print, #view-print * { visibility: visible; }
            #view-print { position: absolute; left: 0; top: 0; width: 100%; padding: 0; background: white; }
            .no-print { display: none !important; }
        }
        .a4-preview { max-width: 210mm; min-height: 297mm; padding: 20px; margin: auto; background: white; border: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <script>
        const CONFIG = {
            LOGO_DATA: "", // เว้นว่างไว้ตามต้องการ
            API_URL: "https://script.google.com/macros/s/AKfycbwGxUo4rcccPDoQqjdazV7VI8C0Or7GvlS0Y4wT1E4-0fTeBCNpGyOKDe2RtZumbbyjSg/exec"
        };
    </script>

    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-5 rounded-lg flex flex-col items-center shadow-xl">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-2"></div>
            <span>กำลังดำเนินการ...</span>
        </div>
    </div>

    <div id="view-main" class="view-section max-w-md mx-auto">
        <div class="main-card p-6 rounded-2xl shadow-xl border border-gray-200">
            <div class="text-center mb-6">
                <div class="logo-placeholder">TCT LOGO</div>
                <h1 class="text-2xl font-bold text-gray-800">ลงทะเบียนเข้าประชุม</h1>
                <p class="text-sm text-gray-500 italic">Fast Registration Mode</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ประเภทการประชุม</label>
                    <select id="typeInput" class="w-full mt-1 p-3 border border-gray-300 rounded-lg outline-none bg-white">
                        <option value="Morning Talk">Morning Talk</option>
                        <option value="KYT">KYT</option>
                        <option value="Safety">Safety</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">รหัสพนักงาน</label>
                    <input type="text" id="empId" placeholder="ป้อนรหัสแล้วกด Enter" class="w-full mt-1 p-3 border border-gray-300 rounded-lg text-center text-2xl font-bold">
                </div>
                <button onclick="submitRegistration()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-md transition-all">
                    บันทึกข้อมูล
                </button>
                <button onclick="switchView('view-report-setup')" class="w-full text-blue-600 text-sm py-2 hover:underline">
                    เรียกดูและพิมพ์รายงานประจำวัน
                </button>
            </div>
        </div>
    </div>

    <div id="view-report-setup" class="view-section max-w-md mx-auto hidden">
        <div class="bg-white p-6 rounded-2xl shadow-lg border">
            <h2 class="text-xl font-bold mb-4">ดึงข้อมูลย้อนหลัง</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-sm">ประเภท</label>
                    <select id="reportType" class="w-full p-2 border rounded">
                        <option value="Morning Talk">Morning Talk</option>
                        <option value="KYT">KYT</option>
                        <option value="Safety">Safety</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm">วันที่</label>
                    <input type="date" id="reportDate" class="w-full p-2 border rounded">
                </div>
                <button onclick="fetchReport()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow">
                    ดึงข้อมูลจากเซิร์ฟเวอร์
                </button>
                <button onclick="switchView('view-main')" class="w-full text-gray-400 py-2">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

    <div id="view-print" class="view-section hidden">
        <div class="no-print max-w-4xl mx-auto mb-4 flex justify-between">
            <button onclick="switchView('view-report-setup')" class="bg-gray-500 text-white px-4 py-2 rounded">ย้อนกลับ</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold shadow">พิมพ์ใบรายงาน</button>
        </div>

        <div class="a4-preview shadow-lg">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold">สรุปรายชื่อผู้เข้าร่วมประชุม</h1>
                <p>ประเภท: <span id="r-type" class="font-bold border-b border-black px-2"></span> | วันที่: <span id="r-date" class="font-bold border-b border-black px-2"></span></p>
            </div>

            <table class="w-full border-collapse border border-black text-sm">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="border border-black p-2 w-12">ลำดับ</th>
                        <th class="border border-black p-2">ชื่อ-นามสกุล</th>
                        <th class="border border-black p-2 w-24">รหัสพนักงาน</th>
                        <th class="border border-black p-2">ตำแหน่ง/แผนก</th>
                        <th class="border border-black p-2 w-24">เวลา</th>
                    </tr>
                </thead>
                <tbody id="r-tbody">
                    </tbody>
            </table>
            <div class="mt-10 flex justify-end px-10">
                <div class="text-center w-40">
                    <div class="border-b border-black h-8"></div>
                    <p class="text-xs mt-1">ผู้ควบคุมการประชุม</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

        // ฟังก์ชันบันทึก: ส่งข้อมูลไปเขียนลง Sheet แล้วจบการทำงานทันที
        async function submitRegistration() {
            const empId = document.getElementById('empId').value.trim();
            const type = document.getElementById('typeInput').value;

            if (!empId) return;

            showLoading();
            try {
                // ส่ง Request แบบ Write-Only (ส่งไปบันทึก)
                const response = await fetch(`${CONFIG.API_URL}?action=register&empId=${empId}&type=${type}`);
                const res = await response.json();
                hideLoading();

                if (res.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        timer: 1000,
                        showConfirmButton: false,
                        toast: true,
                        position: 'top-end'
                    });
                    document.getElementById('empId').value = '';
                    document.getElementById('empId').focus();
                } else {
                    Swal.fire('Error', res.message, 'error');
                }
            } catch (e) {
                hideLoading();
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
            }
        }

        // ฟังก์ชันดึงรายงาน: ดึงข้อมูลเมื่อมีการร้องขอ (On-Demand)
        async function fetchReport() {
            const type = document.getElementById('reportType').value;
            const dateInput = document.getElementById('reportDate').value;

            if (!dateInput) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกวันที่', 'warning');

            const [y, m, d] = dateInput.split('-');
            const dateStr = `${d}/${m}/${y}`;

            showLoading();
            try {
                // ดึงข้อมูลหนักๆ เฉพาะตอนนี้
                const response = await fetch(`${CONFIG.API_URL}?action=report&type=${type}&date=${dateStr}`);
                const res = await response.json();
                hideLoading();

                if (res.status === 'success') {
                    if (res.data.length === 0) return Swal.fire('ไม่พบข้อมูล', 'ไม่มีรายการในวันที่ระบุ', 'info');
                    
                    document.getElementById('r-type').innerText = type;
                    document.getElementById('r-date').innerText = dateStr;
                    
                    const tbody = document.getElementById('r-tbody');
                    tbody.innerHTML = res.data.map(item => `
                        <tr>
                            <td class="border border-black p-2 text-center">${item.no}</td>
                            <td class="border border-black p-2">${item.name}</td>
                            <td class="border border-black p-2 text-center">${item.empId}</td>
                            <td class="border border-black p-2">${item.position}</td>
                            <td class="border border-black p-2 text-center">${item.time}</td>
                        </tr>
                    `).join('');

                    switchView('view-print');
                } else {
                    Swal.fire('Error', res.message, 'error');
                }
            } catch (e) {
                hideLoading();
                Swal.fire('Error', 'โหลดข้อมูลไม่สำเร็จ', 'error');
            }
        }

        // รองรับการกด Enter ในช่องรหัสพนักงาน
        document.getElementById('empId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitRegistration();
        });

        // Set default date
        document.getElementById('reportDate').valueAsDate = new Date();
    </script>
</body>
</html>
